[project]
name = "weevr"
version = "1.18.0" # x-release-please-version
description = "Metadata-driven execution engine for Fabric/Spark data pipelines."
readme = "README.md"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [
    { name = "Pierre LaFromboise", email = "44212292+DataInsightPro@users.noreply.github.com" }
]
requires-python = ">=3.11,<3.12"
keywords = ["spark", "pyspark", "fabric", "etl", "data-pipeline", "yaml", "configuration", "delta-lake"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Topic :: Database",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "weevr-core==1.18.0", # x-release-please-version
    "pydantic>=2.0,<3.0",
    "pyyaml>=6.0,<7.0",
]

[project.urls]
Documentation = "https://ardent-data.github.io/weevr/"
Repository = "https://github.com/ardent-data/weevr"
Issues = "https://github.com/ardent-data/weevr/issues"
Changelog = "https://github.com/ardent-data/weevr/blob/main/CHANGELOG.md"

[build-system]
requires = ["uv_build>=0.10.0,<0.11.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "weevr"
namespace = true

[dependency-groups]
dev = [
    "delta-spark>=3.2.0,<3.3.0",
    "interrogate>=1.7.0",
    "mike>=2.1.3,<3",
    "mkdocs-d2-plugin>=1.0.0,<2",
    "mkdocs-material>=9.7.3,<10",
    "mkdocstrings[python]>=1.0.3,<2",
    "pyright>=1.1.408",
    "pyspark>=3.5.0,<3.6.0",
    "pytest>=9.0.2",
    "pytest-cov>=7.0.0",
    "ruff>=0.15.0",
]

