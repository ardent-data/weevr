[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
weevr-core = { workspace = true }

[tool.ruff]
target-version = "py311"
line-length = 100
src = ["packages/weevr-core/src", "packages/weevr/src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "D"]
ignore = ["D203", "D213"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["D"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.isort]
known-first-party = ["weevr"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pyright]
pythonVersion = "3.11"
typeCheckingMode = "standard"

include = ["packages/weevr-core/src", "packages/weevr/src", "tests"]
exclude = ["**/__pycache__", ".venv", ".git", ".github"]

reportMissingTypeStubs = false
useLibraryCodeForTypes = true

# Pyright cannot merge the engine wheel's regular weevr package
# (which ships weevr/__init__.py for the lazy Context entry point)
# with namespace contributions weevr-core makes to weevr.config,
# weevr.errors, weevr.model, weevr.engine.planner / formatting, and
# weevr.telemetry.* — when a regular package wins the resolver's
# scan, namespace portions on other extraPaths are dropped. Runtime
# resolution works (Python's PEP 420 + each federated __init__.py's
# __path__ extension wire both src/ roots into the namespace at
# import time) and is locked by the full pytest suite including the
# no-pyspark lock test. Downgrade reportMissingImports and the
# cascade-from-missing-import reportAttributeAccessIssue so the
# federated cross-wheel imports do not block CI; genuine new
# attribute-access issues elsewhere still surface as warnings to
# preserve the signal. The executionEnvironments below scope each
# src/ to see the other so most analysis still runs cleanly.
reportMissingImports = "none"
reportAttributeAccessIssue = "warning"

[[tool.pyright.executionEnvironments]]
root = "packages/weevr-core/src"
extraPaths = ["packages/weevr/src"]

[[tool.pyright.executionEnvironments]]
root = "packages/weevr/src"
extraPaths = ["packages/weevr-core/src"]

[[tool.pyright.executionEnvironments]]
root = "tests"
extraPaths = ["packages/weevr-core/src", "packages/weevr/src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q -m 'not spark'"
markers = [
    "spark: marks tests that require PySpark and Delta Lake (deselected by default)",
    "install_smoke: builds wheels and installs into isolated venvs (deselected by default)",
]

[tool.interrogate]
fail-under = 90
ignore-init-method = true
ignore-init-module = false
ignore-module = false
ignore-private = true
ignore-semiprivate = true
