[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
weevr-core = { workspace = true }

[tool.ruff]
target-version = "py311"
line-length = 100
src = ["packages/weevr-core/src", "packages/weevr/src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "D"]
ignore = ["D203", "D213"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["D"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.isort]
known-first-party = ["weevr"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pyright]
pythonVersion = "3.11"
typeCheckingMode = "standard"

include = ["packages/weevr-core/src", "packages/weevr/src", "tests"]
exclude = ["**/__pycache__", ".venv", ".git", ".github"]
extraPaths = ["packages/weevr-core/src", "packages/weevr/src"]

venvPath = "."
venv = ".venv"

reportMissingTypeStubs = false
reportMissingImports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q -m 'not spark'"
markers = [
    "spark: marks tests that require PySpark and Delta Lake (deselected by default)",
    "install_smoke: builds wheels and installs into isolated venvs (deselected by default)",
]

[tool.interrogate]
fail-under = 90
ignore-init-method = true
ignore-init-module = false
ignore-module = false
ignore-private = true
ignore-semiprivate = true
