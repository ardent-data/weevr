name: Bug report
description: Report a defect or unexpected behavior
labels: ["bug", "status:triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Provide minimal steps or a small example.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Minimal config snippet
      description: Smallest YAML that reproduces the issue. Sanitize any secrets or paths.
      render: yaml
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Blocks me — no workaround
        - Workaround exists but painful
        - Nuisance — easy to work around
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: weevr version
      placeholder: "1.16.3"
    validations:
      required: false

  - type: input
    id: runtime
    attributes:
      label: Spark / Fabric runtime
      description: Fabric runtime version, or local Spark version if not on Fabric.
      placeholder: "Fabric Runtime 1.3 (Spark 3.5)"
    validations:
      required: false

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11.x"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Paste relevant output (sanitized).
      render: shell
    validations:
      required: false
