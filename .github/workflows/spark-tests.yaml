name: Spark Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  spark-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.28"
          enable-cache: true

      - name: Sync (locked)
        run: uv sync --locked --dev

      - name: Tests with coverage
        run: uv run pytest -m "" --cov=src/weevr --cov-fail-under=90
