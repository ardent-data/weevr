name: Release Quality

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  release-quality:
    if: startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.28"
          enable-cache: true

      - name: Sync (locked)
        run: uv sync --locked --dev

      - name: Build docs (strict)
        run: uv run mkdocs build --strict

      - name: Lint markdown
        run: npx markdownlint-cli2 "docs/**/*.md"

      - name: Spellcheck
        run: npx cspell "docs/**/*.md" "examples/**/*.md"

      - name: Docstring coverage
        run: uv run interrogate src/weevr/ --fail-under 90

      - name: Docstring quality
        run: uv run ruff check . --select D

      - name: Test coverage
        run: uv run pytest -m "" --cov=src/weevr --cov-fail-under=90
