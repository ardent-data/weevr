name: Docs

on:
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "examples/**"
      - "packages/weevr-core/src/weevr/**"
      - "packages/weevr/src/weevr/**"
      - "pyproject.toml"
      - "packages/*/pyproject.toml"
      - "CONTRIBUTING.md"
    branches:
      - main
      - "release-please--*"

jobs:
  docs-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.28"
          enable-cache: true

      - name: Sync (locked)
        run: uv sync --locked --dev

      - name: Install D2
        run: curl -fsSL https://d2lang.com/install.sh | sh -s --
        env:
          D2_VERSION: "0.6.9"

      - name: Build docs (strict)
        run: uv run mkdocs build --strict

      - name: Lint markdown
        run: npx markdownlint-cli2 "docs/**/*.md"

      - name: Spellcheck
        run: npx cspell "docs/**/*.md" "examples/**/*.md"
