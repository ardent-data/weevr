name: Docs

on:
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "examples/**"
    branches:
      - main
      - "release-please--*"
  release:
    types: [published]

jobs:
  docs-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.28"
          enable-cache: true

      - name: Sync (locked)
        run: uv sync --locked --dev

      - name: Build docs (strict)
        run: uv run mkdocs build --strict

      - name: Lint markdown
        run: npx markdownlint-cli2 "docs/**/*.md"

  release-quality:
    if: github.event_name == 'pull_request' && startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.28"
          enable-cache: true

      - name: Sync (locked)
        run: uv sync --locked --dev

      - name: Build docs (strict)
        run: uv run mkdocs build --strict

      - name: Lint markdown
        run: npx markdownlint-cli2 "docs/**/*.md"

      - name: Spellcheck
        run: npx cspell "docs/**/*.md" "examples/**/*.md"

      - name: Docstring coverage
        run: uv run interrogate src/weevr/ --fail-under 90

      - name: Docstring quality
        run: uv run ruff check . --select D

      - name: Test coverage
        run: uv run pytest --cov --cov-fail-under=90

  deploy-docs:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.28"
          enable-cache: true

      - name: Sync (locked)
        run: uv sync --locked --dev

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy docs
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed -E 's/^v([0-9]+\.[0-9]+).*/\1/')
          uv run mike deploy "$VERSION" latest --update-aliases --push
